name: CI

# Two jobs, run in parallel on every push/PR to main. BOTH are required status
# checks on main (branch protection), so neither can be skipped to reach main:
#   • test — the FAST GATE: lint + typecheck + the Vitest suite (298 unit/
#     integration tests, incl. the content-integrity and i18n-parity regression
#     guards) run WITH coverage thresholds (see vitest.config.ts). Runs in ~a few
#     seconds; catches a broken content file, a dropped translation key, a type
#     error, or a coverage drop.
#   • e2e  — the Playwright suite (builds + serves the prod site, sweeps chromium
#     + mobile-chrome). Heavier (build + browser download) so it's slower, but it
#     is a required check too: a broken prod build or page regression blocks merge.
#
# NOTE: the required-check names below are wired into branch protection by job
# `name:` ("Lint, typecheck & test" and "E2E (Playwright)"). Renaming a job here
# without updating the required contexts will deadlock merges (the old context
# never reports). Update both together.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A new push to a PR cancels the in-flight run for that ref — no point finishing
# a check on a commit that's already been superseded. On main we DON'T cancel:
# a superseded run there may be mid-`deploy`, and killing wrangler partway is
# riskier than letting the older run finish (the newer push deploys right after).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  test:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # matches package.json engines (">=22")
          cache: npm

      # vitest 4 pulls in rolldown, whose linux native binding
      # (@rolldown/binding-linux-x64-gnu) is recorded as an optionalDependency
      # but gets NO package entry in a macOS-authored lockfile — so neither
      # `npm ci` nor `npm install` materializes it on the linux runner (npm
      # cross-platform optional-dep bug). The same bug would mirror (missing the
      # darwin binding) on a linux-authored lock, so no single committed lock
      # satisfies both OSes. Resolve fresh on the runner's own platform instead.
      - name: Install dependencies
        run: rm -f package-lock.json && npm install --no-audit --no-fund

      - name: Lint (eslint + design-token check)
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      # Runs the suite WITH coverage; vitest.config.ts's coverage.thresholds fail
      # the job if lib/ coverage regresses below the committed floor.
      - name: Unit & integration tests + coverage gate (Vitest)
        run: npm run test:coverage

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # See the note in the `test` job: resolve deps fresh on the runner so the
      # linux rolldown/esbuild native bindings are installed (cross-platform
      # lockfile bug).
      - name: Install dependencies
        run: rm -f package-lock.json && npm install --no-audit --no-fund

      # Only chromium is needed: both projects (desktop chromium + mobile-chrome)
      # use the chromium engine. --with-deps pulls the OS libraries on the runner.
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      # playwright.config.ts's webServer runs `npm run build && next start`, so
      # this builds the prod site and serves it before sweeping. CI=true makes
      # the config forbid `.only`, retry flaky specs, and not reuse a server.
      #
      # The contact form embeds a Turnstile widget keyed off this build-time var.
      # Without it the widget mounts with an empty sitekey, throws a console error
      # (fails the /support "no page errors" smoke test) and never issues a token
      # (so the mocked-submission specs can't submit). Use Cloudflare's documented
      # testing sitekey, which always passes and auto-issues a token with no user
      # interaction — deterministic in CI. The server siteverify is mocked by the
      # specs, so no secret key is needed here.
      - name: Run E2E suite
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA

      # Keep the HTML report + traces/screenshots from failures for debugging.
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # Web-accounts contract suite (feature 006): drives the app's real sign-in →
  # Firestore writes against the Firebase Emulator Suite with the feature flag ON,
  # verifying the cross-platform document contracts (profile shape, per-key
  # progress merges, premium resolution) that a unit test can't observe.
  #
  # NOT in `deploy.needs`: the feature ships behind NEXT_PUBLIC_WEB_ACCOUNTS,
  # which stays unset in production until the launch gates pass, so this must not
  # gate the deploy of the flag-off site. It runs as a required signal on PRs.
  # Driving signInWithPopup through the emulator widget is inherently flaky in
  # headless Chromium; the config retries (see playwright.emulator.config.ts).
  e2e-auth:
    name: E2E accounts (Firebase emulators)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # The Firestore emulator is a Java process; firebase-tools requires JDK ≥ 21.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # See the note in the `test` job: resolve deps fresh for the linux native
      # bindings (rolldown/esbuild) missing from a macOS-authored lockfile.
      - name: Install dependencies
        run: rm -f package-lock.json && npm install --no-audit --no-fund

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      # The config's webServer starts the emulators (auth+firestore) and a
      # flag-ON `next build && next start`, then Playwright drives the suite.
      - name: Run accounts E2E (emulators)
        run: npm run test:e2e:auth

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-auth
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # Build the OpenNext bundle and ship it to Cloudflare Workers. Runs ONLY on a
  # direct push to main (never on PRs) and ONLY after both gates above are green,
  # so nothing reaches production without passing lint/typecheck/tests + E2E.
  deploy:
    name: Deploy (Cloudflare Workers)
    needs: [test, e2e]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    # Serialize deploys: at most one in flight, and never cancel a running one
    # (a half-applied `wrangler deploy` is worse than a queued one).
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    environment:
      name: production
      url: https://alnahwalkafi.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Same cross-platform lockfile bug as the other jobs: resolve deps fresh on
      # the linux runner so the native rolldown/esbuild bindings are installed.
      - name: Install dependencies
        run: rm -f package-lock.json && npm install --no-audit --no-fund

      # `.env.production` is gitignored, so the build-time vars it holds locally
      # are absent on the runner. Without them the sitemap/robots/JSON-LD/canonical
      # URLs ship as localhost and server-action payloads get a fresh encryption
      # key each deploy. Supply them from repo secrets at build time. The encryption
      # key MUST be the same value every deploy so overlapping deploys can decrypt
      # each other's action payloads — keep it pinned in the secret.
      - name: Build & deploy to Cloudflare
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SITE_URL: https://alnahwalkafi.com
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}
