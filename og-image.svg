<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!--
    Open Graph image for Al-Nahw Al-Kafi (النحو الكافي)
    Dimensions: 1200×630 (Facebook/Twitter/LinkedIn standard)
    Place at: public/og/og-image.svg (and convert to .png for production)

    Conversion to PNG:
      brew install librsvg
      rsvg-convert -w 1200 -h 630 og-image.svg > og-image.png

    Or use any online SVG-to-PNG converter at 1200×630.
  -->

  <!-- Background -->
  <rect width="1200" height="630" fill="#0F1419"/>

  <!-- Decorative grid pattern (very subtle) -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1A1F26" stroke-width="1"/>
    </pattern>

    <!-- Teal accent gradient for the divider -->
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#14B8A6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft glow behind the Arabic title -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Soft glow behind center -->
  <ellipse cx="600" cy="280" rx="500" ry="180" fill="url(#glow)"/>

  <!-- Top-left brand mark (small, English) -->
  <text x="80" y="90"
        font-family="Inter, system-ui, sans-serif"
        font-size="24"
        font-weight="600"
        fill="#F1F5F9"
        letter-spacing="0.5">
    Al-Nahw Al-Kafi
  </text>

  <!-- Top-right developer credit -->
  <text x="1120" y="90"
        font-family="Inter, system-ui, sans-serif"
        font-size="18"
        font-weight="400"
        fill="#94A3B8"
        text-anchor="end">
    by ETA TECH
  </text>

  <!-- Main Arabic title (centered) -->
  <text x="600" y="290"
        font-family="'Noto Naskh Arabic', 'Cairo', 'Tajawal', serif"
        font-size="140"
        font-weight="700"
        fill="#F1F5F9"
        text-anchor="middle"
        direction="rtl">
    النحو الكافي
  </text>

  <!-- Decorative accent line under the title -->
  <rect x="400" y="330" width="400" height="3" fill="url(#accentLine)" rx="1.5"/>

  <!-- Arabic subtitle -->
  <text x="600" y="395"
        font-family="'Noto Naskh Arabic', 'Cairo', 'Tajawal', serif"
        font-size="34"
        font-weight="500"
        fill="#14B8A6"
        text-anchor="middle"
        direction="rtl">
    تعلَّم النحو العربي بأسلوب جديد
  </text>

  <!-- English subtitle -->
  <text x="600" y="450"
        font-family="Inter, system-ui, sans-serif"
        font-size="26"
        font-weight="400"
        fill="#94A3B8"
        text-anchor="middle">
    Learn Arabic Grammar — Free on iOS and Android
  </text>

  <!-- Bottom row: rating + store badges (text-based) -->
  <g transform="translate(600, 540)">
    <!-- Star icon -->
    <path d="M -310 -12 L -304 0 L -290 2 L -300 12 L -298 26 L -310 19 L -322 26 L -320 12 L -330 2 L -316 0 Z"
          fill="#F59E0B"/>

    <!-- Rating text -->
    <text x="-275" y="8"
          font-family="Inter, system-ui, sans-serif"
          font-size="24"
          font-weight="600"
          fill="#F1F5F9">
      4.7
    </text>

    <text x="-235" y="8"
          font-family="Inter, system-ui, sans-serif"
          font-size="22"
          font-weight="400"
          fill="#94A3B8">
      · 2,600+ reviews on Google Play
    </text>
  </g>

  <!-- Bottom-center store availability bar -->
  <g transform="translate(600, 590)">
    <rect x="-180" y="-22" width="360" height="36" rx="18"
          fill="#1A1F26" stroke="#2A2F38" stroke-width="1"/>
    <text x="0" y="3"
          font-family="Inter, system-ui, sans-serif"
          font-size="16"
          font-weight="500"
          fill="#94A3B8"
          text-anchor="middle">
      Available on App Store and Google Play
    </text>
  </g>
</svg>
